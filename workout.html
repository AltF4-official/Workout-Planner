<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Workout Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="workout.css">
</head>
<body>
  <div id="week-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div id="modal-inner"></div>
    </div>
  </div>
  <div id="timer-bar" class="timer-bar hidden">
    <div class="timer-inner">
      <div class="timer-left">
        <div class="timer-pulse"></div>
        <span id="timer-day-label"></span>
      </div>
      <span id="timer-display">00:00</span>
    </div>
  </div>

  <header>
    <span class="wordmark">Workout</span>
    <span id="today-label" class="today-label"></span>
  </header>

  <main id="days-container"></main>

  <section id="week-summary" class="week-summary hidden"></section>

  <script src="workout.js"></script>
</body>
</html>
